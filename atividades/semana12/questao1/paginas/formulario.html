<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="../estilos/formulario.css">
</head>
<body>
    <main>
        <form id="formulario" action="respFormulario.html" method="post">
        <fieldset>
            <legend>Deixe um comentário</legend>
            <label for="lbNome">Nome:</label>
            <input type="text" id="ipNome" name="ipNome">
            <label for="lbEmail">Email:</label>
            <input type="email" id="ipEmail" name="ipEmail" required>
            <label for="lbUrl">Website:</label>
            <input type="url" id="ipUrl" name="ipUrl" required>
            <label for="lbComentario">Comentário:</label>
            <textarea name="comentario" id="lbComentario" rows="5"></textarea>
            <h2>Observação: Seu comentário será publicado após passar pelo moderador</h2>
            <input type="submit" value="Enviar Comentário">
        </fieldset>
        </form>
    </main>
</body>
</html>
